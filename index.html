<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Alphabubbles</title>

<!-- Rounded, toddler-friendly display font. Falls back to a system rounded
     stack if offline, so the game still works with no network. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ===================================================================
     DESIGN TOKENS
     One place for every colour, size and timing. Tune the feel here.
     =================================================================== */
  :root {
    /* Sky (top -> horizon) */
    --sky-top:      #6FB1E0;
    --sky-mid:      #A9D6F0;
    --sky-horizon:  #FBE9CE;

    /* Ground */
    --meadow-top:   #8FD07A;
    --meadow-bot:   #6FB85C;

    /* Cloud */
    --cloud:        #FFFFFF;
    --cloud-shadow: #C7DBEC;
    --cloud-guide:  #9FBBD4;  /* faint hint letter shown inside each gap */

    /* Ink / UI text */
    --ink:          #37485F;
    --ink-soft:     #6A7C93;

    /* Candy palette for balloons & filled letters (cycled by slot index) */
    --candy-1: #FF7B7B;
    --candy-2: #FFC94D;
    --candy-3: #6FCF86;
    --candy-4: #5BB8F0;
    --candy-5: #B191E8;
    --candy-6: #FF8FC0;

    /* Keyboard */
    --key-face:     rgba(255, 255, 255, 0.55);
    --key-edge:     rgba(255, 255, 255, 0.85);
    --key-blank:    rgba(255, 255, 255, 0.22);
    --key-lit-ink:  #37485F;
    --key-glow:     #FFD166;

    /* Type */
    --font-display: "Fredoka", "Trebuchet MS", "Segoe UI Rounded", system-ui, sans-serif;

    /* Layout */
    --keyboard-height: 33vh;
    --key-gap: 0.6vmin;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-display);
    color: var(--ink);
    background: var(--sky-top);
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* The whole stage: sky on top, meadow + keyboard at the bottom. */
  #stage {
    position: relative;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background:
      linear-gradient(to bottom,
        var(--sky-top)     0%,
        var(--sky-mid)     45%,
        var(--sky-horizon) 100%);
  }

  /* Soft rolling meadow the keyboard sits on. */
  #meadow {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: calc(var(--keyboard-height) + 6vh);
    background: linear-gradient(to bottom, var(--meadow-top), var(--meadow-bot));
    border-top-left-radius: 50% 12vh;
    border-top-right-radius: 50% 12vh;
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.25);
    z-index: 1;
  }

  /* ===================================================================
     WORD CLOUD  (SVG: the word being spelled, as gaps in one cloud)
     =================================================================== */
  #cloud-layer {
    position: absolute;
    top: 4vh; left: 0; right: 0;
    display: flex;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
  }
  #cloud-svg { width: min(92vw, 900px); height: auto; overflow: visible; }

  .filled-letter {
    font-family: var(--font-display);
    font-weight: 700;
    /* Pop-in when a bubble lands and becomes the solid letter. fill-box
       keeps the scale centred on the glyph, not the SVG origin. */
    animation: settle 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    transform-box: fill-box;
    transform-origin: center;
  }
  @keyframes settle {
    0%   { opacity: 0; transform: scale(0.4) translateY(8px); }
    100% { opacity: 1; transform: scale(1)   translateY(0);   }
  }

  /* The ACTIVE gap: a pulsing gold OUTLINE traces the letter-shaped hole,
     in sync with the target key. Outline only - the gap itself stays
     empty-looking so it can't be mistaken for an already-found letter.
     Deliberate redundancy: the child matches glowing shape to glowing key. */
  .gap-guide { opacity: 0.5; }
  .gap-outline {
    pointer-events: none;
    animation: gapPulse 1.1s ease-in-out infinite;
  }
  @keyframes gapPulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  /* ===================================================================
     WORD PICTURE  (hand-drawn SVG character standing on the grass)
     Shown while the word is being spelled; comes alive on completion.
     =================================================================== */
  #picture {
    position: absolute;
    left: 4vw;
    bottom: calc(var(--keyboard-height) + 1.5vh);
    width: clamp(90px, 21vmin, 220px);
    z-index: 2;
    pointer-events: none;
  }
  #picture svg {
    display: block;
    width: 100%;
    height: auto;
    animation: picIdle 3.2s ease-in-out infinite;   /* gentle idle bob */
    transform-origin: 50% 100%;
  }
  #picture.celebrate svg {
    animation: picCheer 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 3;
  }
  @keyframes picIdle {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-1.2vh); }
  }
  @keyframes picCheer {
    0%, 100% { transform: scale(1, 1); }
    35%      { transform: scale(1.08, 0.9); }
    70%      { transform: scale(0.94, 1.06) translateY(-1.6vh); }
  }

  /* Expression swap: parts marked .on-idle show before completion, parts
     marked .on-cheer (the big smile, opened eyes...) appear on celebrate. */
  #picture .on-cheer { opacity: 0; }
  #picture.celebrate .on-cheer { opacity: 1; }
  #picture.celebrate .on-idle  { opacity: 0; }

  /* Per-part success moves. Every part uses transform-box: fill-box so it
     animates around its own anchor, not the whole SVG's origin. */
  #picture.celebrate .wink {
    animation: wink 1.2s ease-in-out 0.15s 2;
    transform-box: fill-box; transform-origin: center;
  }
  @keyframes wink {
    0%, 55%, 100% { transform: scaleY(1); }
    20%, 40%      { transform: scaleY(0.12); }
  }
  #picture.celebrate .waggle {
    animation: waggle 0.4s ease-in-out 6 alternate;
    transform-box: fill-box; transform-origin: left bottom;
  }
  @keyframes waggle {
    from { transform: rotate(-8deg); }
    to   { transform: rotate(10deg); }
  }
  #picture.celebrate .spin {
    animation: spinAround 1.4s ease-in-out 1;
    transform-box: fill-box; transform-origin: center;
  }
  @keyframes spinAround { to { transform: rotate(360deg); } }
  #picture.celebrate .tip {
    animation: hatTip 0.8s ease-in-out 2;
    transform-box: fill-box; transform-origin: center bottom;
  }
  @keyframes hatTip {
    0%, 100% { transform: rotate(0) translateY(0); }
    40%      { transform: rotate(-14deg) translateY(-10px); }
  }
  #picture.celebrate .nod {
    animation: nod 0.7s ease-in-out 2;
    transform-box: fill-box; transform-origin: center bottom;
  }
  @keyframes nod {
    0%, 100% { transform: rotate(0); }
    30%      { transform: rotate(9deg); }
    70%      { transform: rotate(-9deg); }
  }
  #picture.celebrate .beak-top {
    animation: quackTop 0.3s ease-in-out 6 alternate;
    transform-box: fill-box; transform-origin: left center;
  }
  @keyframes quackTop { to { transform: rotate(-22deg); } }
  #picture.celebrate .kick {
    animation: kick 0.6s ease-in-out 2;
    transform-box: fill-box; transform-origin: top center;
  }
  @keyframes kick {
    0%, 100% { transform: rotate(0); }
    30%      { transform: rotate(-24deg); }
    60%      { transform: rotate(10deg); }
  }
  #picture.celebrate .leg-a,
  #picture.celebrate .arm-b {
    animation: kickA 0.3s ease-in-out 6 alternate;
    transform-box: fill-box; transform-origin: top center;
  }
  #picture.celebrate .leg-b,
  #picture.celebrate .arm-a {
    animation: kickB 0.3s ease-in-out 6 alternate;
    transform-box: fill-box; transform-origin: top center;
  }
  @keyframes kickA { from { transform: rotate(-14deg); } to { transform: rotate(16deg); } }
  @keyframes kickB { from { transform: rotate(16deg); } to { transform: rotate(-14deg); } }

  /* ===================================================================
     BUBBLES  (letter-SHAPED bubbles that rise from the keyboard)
     A bubble is the letter's own glyph, rendered glossy and translucent.
     Because it uses the same glyph + size as the cloud gap, it fits the
     hole exactly when it lands.
     =================================================================== */
  .bubble {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .bubble svg { display: block; overflow: visible; }

  /* Soap-bubble wobble while floating: a soft squash oscillation. */
  .bubble .wobble { animation: wobble 0.9s ease-in-out infinite; transform-origin: 50% 50%; }
  @keyframes wobble {
    0%, 100% { transform: scale(1.04, 0.96); }
    50%      { transform: scale(0.96, 1.04); }
  }

  /* Squish-on-landing: a quick squash-and-settle applied to the inner svg
     so it composes cleanly with the outer element's travel transform. */
  .bubble .squish { animation: squish 0.26s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes squish {
    0%   { transform: scale(1, 1); }
    35%  { transform: scale(1.18, 0.78); }
    70%  { transform: scale(0.94, 1.06); }
    100% { transform: scale(1, 1); }
  }

  /* ===================================================================
     KEYBOARD  (full ANSI wireframe; only "learned" letters are lit)
     =================================================================== */
  #keyboard {
    position: absolute;
    left: 0; right: 0; bottom: 1.5vh;
    height: var(--keyboard-height);
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: var(--key-gap);
    padding: 0 2vw;
  }
  .key-row { display: flex; gap: var(--key-gap); justify-content: center; width: 100%; }

  .key {
    --w: 1;                           /* width in key units (Backspace = 2...) */
    flex: var(--w) 1 0;
    max-width: calc(var(--w) * 7vmin);
    height: 5.6vmin;
    border-radius: 1.2vmin;
    background: var(--key-blank);
    border: 0.3vmin solid var(--key-edge);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2vmin;
    font-weight: 600;
    color: transparent;               /* blank keys show no letter */
    transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
  }

  /* Non-letter keys (Backspace, Enter, Shift, punctuation...): decorative
     wireframe with a faint label so the map matches the real keyboard.
     They are inert: no sound, no bubbles - just a nudge when pressed. */
  .key.deco {
    color: rgba(55, 72, 95, 0.4);
    font-size: 1.7vmin;
    letter-spacing: 0.04em;
  }
  .key.pressed { transform: translateY(2px) scale(0.97); background: rgba(255,255,255,0.4); }

  /* A "learned" letter: visible and pressable. */
  .key.lit {
    background: var(--key-face);
    color: var(--key-lit-ink);
    cursor: pointer;
  }
  .key.lit:active { transform: translateY(2px) scale(0.96); }

  /* The current target key: gently pulsing glow to guide the eye. */
  .key.target {
    box-shadow: 0 0 0 0.4vmin var(--key-glow), 0 0 3vmin var(--key-glow);
    animation: keyPulse 1.1s ease-in-out infinite;
  }
  @keyframes keyPulse {
    0%, 100% { box-shadow: 0 0 0 0.4vmin var(--key-glow), 0 0 2vmin var(--key-glow); }
    50%      { box-shadow: 0 0 0 0.7vmin var(--key-glow), 0 0 5vmin var(--key-glow); }
  }

  /* ===================================================================
     CELEBRATION + START GATE
     =================================================================== */
  #banner {
    position: absolute;
    top: 34vh; left: 0; right: 0;
    text-align: center;
    font-size: 9vmin;
    font-weight: 700;
    color: var(--ink);
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 5;
    pointer-events: none;
  }
  #banner.show { opacity: 1; animation: cheer 0.6s ease; }
  @keyframes cheer {
    0% { transform: scale(0.6); } 60% { transform: scale(1.15); } 100% { transform: scale(1); }
  }

  #start-gate {
    position: absolute; inset: 0;
    z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3vh;
    background: linear-gradient(to bottom, var(--sky-top), var(--sky-horizon));
  }
  #start-gate h1 {
    font-size: 11vmin; font-weight: 700; color: #FFFFFF;
    text-shadow: 0 3px 0 rgba(0,0,0,0.08);
    letter-spacing: 0.02em;
  }
  #start-button {
    font-family: var(--font-display);
    font-size: 6vmin; font-weight: 600;
    color: var(--ink);
    background: #FFFFFF;
    border: none;
    padding: 2.5vh 8vw;
    border-radius: 999px;
    box-shadow: 0 0.8vh 0 var(--cloud-shadow);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  #start-button:active { transform: translateY(0.4vh); box-shadow: 0 0.4vh 0 var(--cloud-shadow); }
  #start-button:focus-visible { outline: 0.5vmin solid var(--candy-4); outline-offset: 0.5vmin; }

  /* Respect users who prefer less motion: keep the game, calm the drift.
     Expression swaps (the big smile) still happen - they are opacity
     toggles, not animations. */
  @media (prefers-reduced-motion: reduce) {
    .key.target { animation: none; }
    .bubble { transition: none !important; }
    .bubble .wobble { animation: none; }
    .gap-outline { animation: none; }
    #picture svg, #picture svg * { animation: none !important; }
  }
</style>
</head>

<body>
  <div id="stage">
    <div id="cloud-layer"><svg id="cloud-svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
    <div id="banner"></div>
    <div id="meadow"></div>
    <div id="picture"></div>
    <div id="keyboard"></div>

    <div id="start-gate">
      <h1>Alphabubbles</h1>
      <button id="start-button" type="button">Tap to start</button>
    </div>
  </div>

<script>
"use strict";

/* =====================================================================
   ALPHABUBBLES
   A gentle alphabet + typing game for a very young child.

   Press the glowing key -> a letter-SHAPED bubble of that letter floats
   up and nests into its matching letter-shaped gap in the cloud, squishing
   into place and becoming a bright solid letter. Wrong keys still make
   their sound and float a bubble by, but nothing lands. No shooting, no
   failure, no timers.

   The code is organised into small, single-purpose modules:
     CONFIG        - every tunable knob
     LEVELS        - the curriculum (edit this to change words/order)
     litLettersUpTo- derives which keys are "learned" from the word list
     Audio         - recorded-file playback with automatic TTS fallback
     LetterLayout  - one source of truth for glyph position (gap = guide = fill)
     Cloud         - builds the word cloud + fills letters + active-gap glow
     Keyboard      - full wireframe, lit letters, target glow, tap support
     Pictures      - hand-drawn SVG per word; animates as the success reward
     Balloons      - spawning, the live cap, rise + drift animation
     Game          - the state machine that ties it together
   ===================================================================== */


/* ---------------------------------------------------------------------
   CONFIG  - tune the feel of the game here.
   --------------------------------------------------------------------- */
const CONFIG = {
  balloonCap: 14,          // max balloons alive at once (sound always plays)
  balloonRiseMs: 1400,     // how long a correct balloon takes to reach its gap
  strayRiseMs: 3200,       // how long a wrong/other balloon drifts up and off
  nextLevelDelayMs: 1900,  // pause after the word is spoken before the next one
  spellStartMs: 650,       // beat after completion before sounding the word out
  spellLetterMs: 520,      // per-letter spacing while sounding out ("Mmm-oh-mmm")
  spellWordGapMs: 650,     // breath before the whole word ("Mom!") - long
                           // enough that it never clips the last phoneme
  tts: {
    rate: 0.8,             // slightly slow, clearer for a toddler
    pitch: 1.15,           // slightly high, friendlier
  },
  soundsPath: "sounds/",   // drop a.mp3 ... z.mp3 here to replace the TTS voice
};

/* ---------------------------------------------------------------------
   LEVELS  - the curriculum. Edit / reorder freely.
   Each level adds at most one or two new letters and reuses old ones.
   "INDI" is the child's name; the finale "QUACK" ends on a duck noise.
   --------------------------------------------------------------------- */
const LEVELS = [
  "MOM", "DAD", "INDI", "CAT", "DOG", "PIG", "SUN", "BUS", "HAT", "BED",
  "COW", "FOX", "RUN", "LEG", "JAM", "KID", "YES", "VAN", "QUACK",
];

/* Approximate phonetic hints for the TTS fallback ("buh", "sss", ...).
   These are deliberately rough; real recordings in sounds/ will replace them. */
const PHONETIC = {
  A:"ah", B:"buh", C:"kuh", D:"duh", E:"eh",  F:"fff", G:"guh",
  H:"huh", I:"ih", J:"juh", K:"kuh", L:"lll", M:"mmm", N:"nnn",
  O:"oh", P:"puh", Q:"kwuh", R:"rrr", S:"sss", T:"tuh", U:"uh",
  V:"vvv", W:"wuh", X:"ks",  Y:"yuh", Z:"zzz",
};

/* Physical keyboard layout used to build the wireframe.
   Entry: [id, label, width-in-key-units]. A single A-Z id is a playable
   letter key; everything else is decorative wireframe (faint label, inert)
   so the on-screen map matches the child's real keyboard. */
const KEY_ROWS = [
  [["`"], ["1"], ["2"], ["3"], ["4"], ["5"], ["6"], ["7"], ["8"], ["9"], ["0"],
   ["-"], ["="], ["Backspace", "⌫", 2]],
  [["Tab", "tab", 1.5], ["Q"], ["W"], ["E"], ["R"], ["T"], ["Y"], ["U"], ["I"],
   ["O"], ["P"], ["["], ["]"], ["\\", "\\", 1.5]],
  [["CapsLock", "caps", 1.75], ["A"], ["S"], ["D"], ["F"], ["G"], ["H"], ["J"],
   ["K"], ["L"], [";"], ["'"], ["Enter", "enter ⏎", 2.25]],
  [["Shift", "shift", 2.25], ["Z"], ["X"], ["C"], ["V"], ["B"], ["N"], ["M"],
   [","], ["."], ["/"], ["Shift", "shift", 2.75]],
  [["Control", "ctrl", 1.5], ["Alt", "alt", 1.25], [" ", "", 9.5],
   ["Alt", "alt", 1.25], ["Control", "ctrl", 1.5]],
];

/* Candy colours, cycled by slot index so each word is cheerfully multi-colour. */
const CANDY = [
  getComputedStyle(document.documentElement).getPropertyValue("--candy-1").trim(),
  getComputedStyle(document.documentElement).getPropertyValue("--candy-2").trim(),
  getComputedStyle(document.documentElement).getPropertyValue("--candy-3").trim(),
  getComputedStyle(document.documentElement).getPropertyValue("--candy-4").trim(),
  getComputedStyle(document.documentElement).getPropertyValue("--candy-5").trim(),
  getComputedStyle(document.documentElement).getPropertyValue("--candy-6").trim(),
];
const candyFor = (i) => CANDY[i % CANDY.length];


/* ---------------------------------------------------------------------
   Derive which letters are "learned" (and therefore lit on the keyboard)
   by the given level index. Persistence is computed from LEVELS, so it
   can never drift out of sync with the word list.
   --------------------------------------------------------------------- */
function litLettersUpTo(levelIndex) {
  const set = new Set();
  for (let i = 0; i <= levelIndex; i++) {
    for (const ch of LEVELS[i]) set.add(ch);
  }
  return set;
}


/* ---------------------------------------------------------------------
   Audio  - plays a letter's sound.
   Tries a recorded file first (sounds/x.mp3); if it is missing or fails,
   automatically falls back to browser speech synthesis using the
   phonetic hint. Sound must ALWAYS fire, so the key->sound bond never
   feels dead - even over the balloon cap.
   --------------------------------------------------------------------- */
const Audio = (() => {
  const cache = new Map();      // letter -> HTMLAudioElement | null (null = no file)
  let unlocked = false;
  let ctx = null;               // Web Audio context for synthesized effects
  let voice = null;             // preferred English TTS voice, once voices load

  /* Some browsers report no voices until "voiceschanged" fires; without an
     explicit voice/lang a few of them stay silent. Prefer a local English
     voice (faster, works offline). */
  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    voice =
      voices.find((v) => v.lang && v.lang.startsWith("en") && v.localService) ||
      voices.find((v) => v.lang && v.lang.startsWith("en")) ||
      null;
  }
  if (window.speechSynthesis) {
    pickVoice();
    window.speechSynthesis.addEventListener("voiceschanged", pickVoice);
  }

  /** Called once on the first user tap to satisfy autoplay policies. */
  function unlock() {
    if (unlocked) return;
    unlocked = true;
    // Nudge speech synthesis awake with a silent utterance.
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(" ");
      u.volume = 0;
      window.speechSynthesis.speak(u);
    }
    // Create (and resume) the audio context for the synthesized effects.
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) {
      ctx = new AC();
      if (ctx.state === "suspended") ctx.resume();
    }
  }

  /**
   * A soft, synthesized "squish" for when a bubble lands in its gap.
   * A quick downward pitch bloop through a lowpass filter reads as a
   * gentle squelch - no audio files needed.
   */
  function squish() {
    if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const lp = ctx.createBiquadFilter();

    osc.type = "triangle";
    osc.frequency.setValueAtTime(480, t);
    osc.frequency.exponentialRampToValueAtTime(150, t + 0.16);

    lp.type = "lowpass";
    lp.frequency.setValueAtTime(1400, t);
    lp.frequency.exponentialRampToValueAtTime(500, t + 0.18);

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.22, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);

    osc.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.24);
  }

  /**
   * A short, cheerful success jingle: a rising major arpeggio with a soft
   * closing chord. Synthesized like the squish, so no files are needed.
   */
  function jingle() {
    if (!ctx) return;
    const t0 = ctx.currentTime + 0.02;
    const note = (freq, at, dur, vol = 0.16, type = "triangle") => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0 + at);
      gain.gain.setValueAtTime(0.0001, t0 + at);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + at + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + at + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0 + at); osc.stop(t0 + at + dur + 0.05);
    };
    note(523.25, 0.00, 0.30);          // C5
    note(659.25, 0.12, 0.30);          // E5
    note(783.99, 0.24, 0.30);          // G5
    note(1046.50, 0.36, 0.45, 0.2);    // C6
    [523.25, 659.25, 783.99].forEach((f) => note(f, 0.6, 0.9, 0.08, "sine"));
  }

  /**
   * Speak text via TTS: one speaker, newest sound wins. Chromium's
   * speechSynthesis is fragile in several ways that all end in silence:
   *   - an utterance spoken in the same task as cancel() is silently
   *     dropped, and "one tick later" is often still too soon;
   *   - the engine can wedge in a paused state and swallow every queued
   *     utterance from then on;
   *   - a pending utterance with no live JS reference can be GC'd.
   * So: always cancel, hold a strong reference, resume() and speak on a
   * short delay, and a watchdog re-speaks if the engine never starts.
   * Sequencing (the sounded-out word) is driven by timers in Game, so
   * newest-wins is safe: each phoneme simply supersedes the previous.
   */
  let current = null;      // strong ref so Chrome can't GC the utterance
  let watchdog = 0;

  function speak(text, { rate = CONFIG.tts.rate, pitch = CONFIG.tts.pitch } = {}) {
    const synth = window.speechSynthesis;
    if (!synth) return;
    clearTimeout(watchdog);
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate;
    u.pitch = pitch;
    u.lang = "en-US";
    if (voice) u.voice = voice;
    u.onstart = () => clearTimeout(watchdog);
    u.onend = u.onerror = () => { if (current === u) current = null; };
    current = u;

    const attempt = (retries) => {
      if (current !== u) return;         // superseded by a newer sound
      synth.resume();                    // un-wedge a paused engine
      synth.speak(u);
      watchdog = setTimeout(() => {
        if (current !== u) return;
        if (!synth.speaking && !synth.pending && retries > 0) {
          synth.cancel();
          attempt(retries - 1);
        }
      }, 500);
    };
    setTimeout(() => attempt(2), 50);    // never speak in cancel()'s task
  }

  /* Some Chromium builds pause the synthesizer after inactivity; a paused
     engine silently swallows every utterance. Nudge it back periodically. */
  setInterval(() => {
    if (window.speechSynthesis && window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
    }
  }, 3000);

  function play(letter) {
    // Try a recorded file the first time; remember the outcome.
    if (!cache.has(letter)) {
      const el = new window.Audio(CONFIG.soundsPath + letter.toLowerCase() + ".mp3");
      el.addEventListener("error", () => cache.set(letter, null), { once: true });
      cache.set(letter, el);
    }
    const el = cache.get(letter);
    if (el) {
      el.currentTime = 0;
      el.play().catch(() => {
        cache.set(letter, null);
        speak(PHONETIC[letter] || letter);
      });
    } else {
      speak(PHONETIC[letter] || letter);   // no file -> phonetic hint
    }
  }

  /** Say a whole word (word-completion celebration). */
  function sayWord(word) {
    speak(word, { rate: 0.85, pitch: 1.1 });
  }

  return { unlock, play, sayWord, squish, jingle };
})();


/* ---------------------------------------------------------------------
   LetterLayout  - the single source of truth for where each letter sits.
   The gap (mask), the faint guide, and the filled letter all read their
   position and size from here, so they line up perfectly by construction.
   Coordinates are in the cloud SVG's own units.
   --------------------------------------------------------------------- */
const LetterLayout = (() => {
  const LETTER_SIZE = 120;     // glyph font-size in SVG units
  const LETTER_GAP  = 18;      // space between letters
  const PAD_X       = 90;      // horizontal cloud padding around the word
  const BASELINE_Y  = 150;     // vertical baseline of the letters

  /** Returns { positions:[{x,y,size,letter}], width, height } for a word. */
  function forWord(word) {
    const stride = LETTER_SIZE * 0.72 + LETTER_GAP;   // advance per letter
    const width  = PAD_X * 2 + stride * word.length;
    const height = 320;
    const positions = [];
    for (let i = 0; i < word.length; i++) {
      positions.push({
        letter: word[i],
        x: PAD_X + stride * i + stride / 2,
        y: BASELINE_Y,
        size: LETTER_SIZE,
      });
    }
    return { positions, width, height };
  }

  return { forWord, SIZE: LETTER_SIZE };
})();


/* ---------------------------------------------------------------------
   Cloud  - renders the current word as letter-shaped gaps in one cloud,
   fills a slot when a bubble arrives, and highlights the active gap.
   --------------------------------------------------------------------- */
const Cloud = (() => {
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("cloud-svg");
  let layout = null;     // current word's LetterLayout result
  let filledEls = [];    // filled <text> per slot (for re-landing pops)
  let outlineEl = null;  // pulsing gold outline traced around the active gap

  const el = (name, attrs = {}) => {
    const node = document.createElementNS(SVGNS, name);
    for (const k in attrs) node.setAttribute(k, attrs[k]);
    return node;
  };

  /* Shared glyph attributes: the gap, the guide and the filled letter must
     be pixel-identical. font-family goes through `style` because var() is
     not valid inside an SVG presentation attribute. */
  const glyphAttrs = (p) => ({
    x: p.x, y: p.y, "font-size": p.size, "font-weight": 700,
    "text-anchor": "middle", "dominant-baseline": "middle",
    style: "font-family: var(--font-display)",
  });

  /** Build a soft, blobby cloud path spanning the given box. */
  function cloudShape(width, height) {
    const g = el("g");
    const cy = height * 0.5;
    // A row of overlapping circles + a rounded body reads as a fluffy cloud.
    const lumps = [
      [width * 0.18, cy,        height * 0.34],
      [width * 0.36, cy - 26,   height * 0.42],
      [width * 0.55, cy - 34,   height * 0.46],
      [width * 0.74, cy - 20,   height * 0.40],
      [width * 0.86, cy,        height * 0.33],
    ];
    for (const [cx, ccy, r] of lumps) {
      g.appendChild(el("circle", { cx, cy: ccy, r, fill: "var(--cloud)" }));
    }
    g.appendChild(el("rect", {
      x: width * 0.10, y: cy - 6, width: width * 0.80, height: height * 0.42,
      rx: height * 0.22, fill: "var(--cloud)",
    }));
    return g;
  }

  /** Render the word: cloud with letter holes, faint guides showing through. */
  function setWord(word) {
    layout = LetterLayout.forWord(word);
    filledEls = [];
    const { positions, width, height } = layout;

    svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const maskId = "cloud-holes";
    const defs = el("defs");
    // The mask's white "keep" rect extends far beyond the viewBox: the
    // cloud's top lumps poke above y=0, and anything outside the rect
    // would be masked away (this was the "clipped flat cloud" bug).
    const mask = el("mask", {
      id: maskId, maskUnits: "userSpaceOnUse",
      x: -width, y: -height, width: width * 3, height: height * 3,
    });
    mask.appendChild(el("rect", {
      x: -width, y: -height, width: width * 3, height: height * 3, fill: "white",
    }));
    for (const p of positions) {
      const t = el("text", Object.assign(glyphAttrs(p), { fill: "black" }));
      t.textContent = p.letter;
      mask.appendChild(t);
    }
    defs.appendChild(mask);
    svg.appendChild(defs);

    // Faint guide letters sit BEHIND the cloud, dimly visible through holes.
    const guides = el("g");
    for (const p of positions) {
      const t = el("text", Object.assign(glyphAttrs(p), {
        fill: "var(--cloud-guide)", class: "gap-guide",
      }));
      t.textContent = p.letter;
      guides.appendChild(t);
    }
    svg.appendChild(guides);

    // The cloud itself, with holes knocked out by the mask.
    const cloud = cloudShape(width, height);
    cloud.setAttribute("mask", `url(#${maskId})`);
    cloud.setAttribute("filter", "drop-shadow(0 6px 6px rgba(80,110,140,0.18))");
    svg.appendChild(cloud);

    // The active-gap outline traces the hole's letter shape ON TOP of the
    // cloud: a soft wide glow stroke under a crisp one. Outline only, so
    // the gap still reads as empty (a filled look would suggest the letter
    // was already found). Repositioned per slot by setActive().
    outlineEl = el("g", { class: "gap-outline" });
    const glowStroke = el("text", Object.assign(glyphAttrs(positions[0]), {
      fill: "none", stroke: "var(--key-glow)", "stroke-width": 13,
      opacity: 0.35, "stroke-linejoin": "round",
    }));
    const crispStroke = el("text", Object.assign(glyphAttrs(positions[0]), {
      fill: "none", stroke: "var(--key-glow)", "stroke-width": 5,
      "stroke-linejoin": "round",
    }));
    outlineEl.appendChild(glowStroke);
    outlineEl.appendChild(crispStroke);
    outlineEl.style.display = "none";
    svg.appendChild(outlineEl);

    // A group that filled letters get appended into (drawn on top of the cloud).
    svg.appendChild(el("g", { id: "filled-letters" }));
  }

  /** Highlight slot `i` as the one being typed (null clears the highlight). */
  function setActive(i) {
    if (!outlineEl) return;
    if (i == null || !layout) {
      outlineEl.style.display = "none";
      return;
    }
    const p = layout.positions[i];
    for (const stroke of outlineEl.children) {
      stroke.setAttribute("x", p.x);
      stroke.setAttribute("y", p.y);
      stroke.textContent = p.letter;
    }
    outlineEl.style.display = "";
  }

  /** Fill slot `i` with its bright, solid letter (the balloon has arrived). */
  function fill(i) {
    const p = layout.positions[i];
    const group = svg.querySelector("#filled-letters");
    const t = el("text", Object.assign(glyphAttrs(p), {
      fill: candyFor(i), class: "filled-letter",
    }));
    t.textContent = p.letter;
    group.appendChild(t);
    filledEls[i] = t;
  }

  /** Re-pop an already-filled letter (a bubble landed in its gap again). */
  function refill(i) {
    const t = filledEls[i];
    if (!t || !t.parentNode) return;
    const group = t.parentNode;
    group.removeChild(t);
    void svg.getBoundingClientRect();   // reflow so the settle animation restarts
    group.appendChild(t);
  }

  /** Map a slot's SVG coordinate to a screen pixel position (for bubble aim). */
  function slotScreenPos(i) {
    const p = layout.positions[i];
    const pt = svg.createSVGPoint();
    pt.x = p.x; pt.y = p.y;
    const screen = pt.matrixTransform(svg.getScreenCTM());
    return { x: screen.x, y: screen.y };
  }

  /** Screen pixels per SVG unit, so a bubble can be sized to match its gap. */
  function scale() {
    const ctm = svg.getScreenCTM();
    return ctm ? ctm.a : 1;
  }

  return { setWord, setActive, fill, refill, slotScreenPos, scale };
})();


/* ---------------------------------------------------------------------
   Keyboard  - the full wireframe keyboard. Only "learned" letters are lit
   and pressable; everything else (blank letters, Backspace, Enter, Shift,
   punctuation...) is inert wireframe that completes the physical map.
   Physical keypresses and on-screen taps go through the same handler.
   --------------------------------------------------------------------- */
const Keyboard = (() => {
  const root = document.getElementById("keyboard");
  const keyEls = new Map();     // letter -> element
  const decoEls = new Map();    // physical event.key -> [elements] (Shift x2...)
  const litSet = new Set();
  let onPress = () => {};       // set by Game

  const isLetter = (id) => id.length === 1 && id >= "A" && id <= "Z";

  function build() {
    for (const row of KEY_ROWS) {
      const rowEl = document.createElement("div");
      rowEl.className = "key-row";
      for (const [id, label, w] of row) {
        const key = document.createElement("div");
        key.className = "key" + (isLetter(id) ? "" : " deco");
        key.style.setProperty("--w", w || 1);
        key.textContent = isLetter(id) ? id : (label !== undefined ? label : id);
        if (isLetter(id)) {
          key.dataset.letter = id;
          // Tap support for tablets: behave exactly like a physical press.
          key.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (key.classList.contains("lit")) onPress(id);
          });
          keyEls.set(id, key);
        } else {
          // Decorative keys just nudge when touched - inert, but alive.
          key.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            nudge(key);
          });
          if (!decoEls.has(id)) decoEls.set(id, []);
          decoEls.get(id).push(key);
        }
        rowEl.appendChild(key);
      }
      root.appendChild(rowEl);
    }
  }

  function nudge(key) {
    key.classList.remove("pressed");
    void key.offsetWidth;               // restart the transition
    key.classList.add("pressed");
    setTimeout(() => key.classList.remove("pressed"), 140);
  }

  /** Visual nudge for a decorative key by its physical event.key.
      Returns true if such a key exists on the wireframe. */
  function flash(physKey) {
    const els = decoEls.get(physKey);
    if (!els) return false;
    els.forEach(nudge);
    return true;
  }

  /** Light exactly the given set of letters; blank the rest. */
  function setLit(letters) {
    litSet.clear();
    for (const l of letters) litSet.add(l);
    for (const [letter, key] of keyEls) {
      key.classList.toggle("lit", litSet.has(letter));
    }
  }

  /** Unlearned keys are inert (DESIGN.md: "blank keys do nothing"). */
  function isLit(letter) { return litSet.has(letter); }

  /** Glow one key as the current target (or clear with null). */
  function setTarget(letter) {
    for (const [l, key] of keyEls) key.classList.toggle("target", l === letter);
  }

  /** Screen position of a key's centre, for launching its balloon. */
  function keyScreenPos(letter) {
    const key = keyEls.get(letter);
    const r = key.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  function setHandler(fn) { onPress = fn; }

  return { build, setLit, isLit, setTarget, keyScreenPos, setHandler, flash };
})();

   y~190). Class names drive the CSS success animations:

     .on-idle/.on-cheer- expression parts swapped at celebration

/* ---------------------------------------------------------------------
   Bubbles  - spawns letter-SHAPED bubbles and animates them. A correct
   bubble rises to its target gap, squishes into place, and reports
   arrival; stray bubbles drift up and off. A live cap keeps the chaos
   joyful, never overwhelming.

   A bubble is the letter's own glyph, drawn glossy and translucent, and
   sized to the current cloud gap so it fits the hole exactly on landing.
   --------------------------------------------------------------------- */
const Balloons = (() => {
  const stage = document.getElementById("stage");
  const SVGNS = "http://www.w3.org/2000/svg";
  let liveCount = 0;
  let uid = 0;                  // unique id source for per-bubble gradients/clips

  const reduceMotion =
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const svgEl = (name, attrs = {}) => {
    const node = document.createElementNS(SVGNS, name);
    for (const k in attrs) node.setAttribute(k, attrs[k]);
    return node;
  };

  /**
   * Build one letter-shaped bubble as a DOM element.
   * The glyph is used several ways so the bubble reads as a glossy letter:
   *   - a clip-path (so the glossy fill + highlights stay inside the letter)
   *   - a radial-gradient body: a bright off-centre hotspot fading to a
   *     saturated rim, like light on a curved soap film
   *   - a specular highlight + small sparkle inside the glyph
   *   - a soft outer glow and a crisp white rim stroke on top (the "skin")
   * It wobbles gently while floating. The wrapper is sized so the glyph
   * renders at the same on-screen size as the cloud gap it will fill
   * (Cloud.scale()), guaranteeing a snug fit.
   */
  function makeBubble(letter, tint) {
    const id = ++uid;
    const S = LetterLayout.SIZE;          // glyph font-size in SVG units
    const VB_W = S * 1.5;                 // padded viewBox around the glyph
    const VB_H = S * 1.7;
    const cx = VB_W / 2;
    const cy = VB_H / 2;
    const pxPerUnit = Cloud.scale();      // match the gap's on-screen size

    const wrap = document.createElement("div");
    wrap.className = "bubble";
    wrap.style.width = (VB_W * pxPerUnit) + "px";

    const svg = svgEl("svg", { viewBox: `0 0 ${VB_W} ${VB_H}`, width: "100%" });
    if (!reduceMotion) svg.classList.add("wobble");

    // Shared glyph attributes (identical to the cloud gap's glyph).
    const glyphAttrs = {
      x: cx, y: cy, "font-size": S, "font-weight": 700,
      "text-anchor": "middle", "dominant-baseline": "middle",
      style: "font-family: var(--font-display)",
    };

    const defs = svgEl("defs");

    // Clip everything to the letter shape.
    const clip = svgEl("clipPath", { id: `bubbleClip${id}` });
    const clipText = svgEl("text", glyphAttrs);
    clipText.textContent = letter;
    clip.appendChild(clipText);
    defs.appendChild(clip);

    // Radial gloss: bright hotspot up-left, deepening colour toward the rim.
    const grad = svgEl("radialGradient", {
      id: `bubbleGrad${id}`, cx: "0.35", cy: "0.28", r: "0.9",
    });
    const stop = (offset, color, opacity, mixed) => {
      const s = svgEl("stop", { offset, "stop-color": color, "stop-opacity": opacity });
      if (mixed) s.style.stopColor = mixed;   // deeper rim where color-mix exists
      return s;
    };
    grad.appendChild(stop("0", "#FFFFFF", "0.95"));
    grad.appendChild(stop("0.35", tint, "0.55"));
    grad.appendChild(stop("0.78", tint, "0.82"));
    grad.appendChild(stop("1", tint, "0.95", `color-mix(in srgb, ${tint} 62%, #35507A)`));
    defs.appendChild(grad);
    svg.appendChild(defs);

    // Body + highlights, all clipped to the glyph.
    const clipped = svgEl("g", { "clip-path": `url(#bubbleClip${id})` });
    clipped.appendChild(svgEl("rect", {
      x: 0, y: 0, width: VB_W, height: VB_H, fill: `url(#bubbleGrad${id})`,
    }));
    clipped.appendChild(svgEl("ellipse", {
      cx: cx - S * 0.16, cy: cy - S * 0.24, rx: S * 0.22, ry: S * 0.3,
      fill: "rgba(255,255,255,0.5)",
      transform: `rotate(-18 ${cx - S * 0.16} ${cy - S * 0.24})`,
    }));
    clipped.appendChild(svgEl("circle", {
      cx: cx + S * 0.22, cy: cy + S * 0.26, r: S * 0.07,
      fill: "rgba(255,255,255,0.55)",
    }));
    svg.appendChild(clipped);

    // Soft outer glow, then a crisp white rim on top: the bubble's skin.
    const glow = svgEl("text", Object.assign({}, glyphAttrs, {
      fill: "none", stroke: "rgba(255,255,255,0.3)", "stroke-width": S * 0.11,
    }));
    glow.textContent = letter;
    svg.appendChild(glow);
    const rim = svgEl("text", Object.assign({}, glyphAttrs, {
      fill: "none", stroke: "rgba(255,255,255,0.9)", "stroke-width": S * 0.055,
    }));
    rim.textContent = letter;
    svg.appendChild(rim);

    wrap.appendChild(svg);
    return wrap;
  }

  function place(wrap, x, y) {
    // x,y are the desired CENTRE in screen px.
    const w = wrap.offsetWidth  || window.innerHeight * 0.12;
    const h = wrap.offsetHeight || w;
    wrap.style.left = (x - w / 2) + "px";
    wrap.style.top  = (y - h / 2) + "px";
  }

  function remove(wrap) {
    if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
    liveCount = Math.max(0, liveCount - 1);
  }

  /**
   * A correct-letter bubble: rise from the key to the target gap, squish
   * into place, then call onArrive(). Returns true if a bubble was spawned
   * (under cap). `tint` colours the bubble to match its finished letter.
   */
  function launchToTarget(letter, fromKey, toSlot, tint, onArrive) {
    if (liveCount >= CONFIG.balloonCap) { onArrive(); return false; }
    liveCount++;

    const wrap = makeBubble(letter, tint);
    stage.appendChild(wrap);
    place(wrap, fromKey.x, fromKey.y);
    const inner = wrap.querySelector("svg");

    const dx = toSlot.x - fromKey.x;
    const dy = toSlot.y - fromKey.y;

    if (reduceMotion) {
      place(wrap, toSlot.x, toSlot.y);
      Audio.squish();
      setTimeout(() => { onArrive(); remove(wrap); }, 120);
      return true;
    }

    wrap.style.transition =
      `transform ${CONFIG.balloonRiseMs}ms cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease`;
    requestAnimationFrame(() => {
      wrap.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    setTimeout(() => {
      // Landed: squish, play the squelch, then hand off to the solid letter.
      Audio.squish();
      inner.classList.remove("wobble");
      inner.classList.add("squish");
      setTimeout(() => {
        onArrive();                       // Cloud.fill pops the solid letter in
        wrap.style.opacity = "0";
        setTimeout(() => remove(wrap), 250);
      }, 180);
    }, CONFIG.balloonRiseMs);
    return true;
  }

  /** A stray bubble (any other key): drift up past the top, then vanish. */
  function launchStray(letter, fromKey) {
    if (liveCount >= CONFIG.balloonCap) return;
    liveCount++;

    const tint = CANDY[Math.floor(Math.random() * CANDY.length)];
    const wrap = makeBubble(letter, tint);
    stage.appendChild(wrap);
    place(wrap, fromKey.x, fromKey.y);

    const drift = (Math.random() - 0.5) * window.innerWidth * 0.3;
    const rise = -(fromKey.y + window.innerHeight * 0.2);

    if (reduceMotion) { setTimeout(() => remove(wrap), 400); return; }

    wrap.style.transition =
      `transform ${CONFIG.strayRiseMs}ms linear, opacity 0.6s ease ${CONFIG.strayRiseMs - 600}ms`;
    requestAnimationFrame(() => {
      wrap.style.transform = `translate(${drift}px, ${rise}px) rotate(${drift * 0.05}deg)`;
      wrap.style.opacity = "0";
    });
    setTimeout(() => remove(wrap), CONFIG.strayRiseMs);
  }

  return { launchToTarget, launchStray };
})();


/* ---------------------------------------------------------------------
   Game  - the state machine. Owns the current level, the active slot,
   and the flow from keypress to word completion to next level.
   --------------------------------------------------------------------- */
const Game = (() => {
  const banner = document.getElementById("banner");

  const state = {
    levelIndex: 0,
    word: "",
    activeSlot: 0,
    accepting: false,   // false during celebration / transitions
    inFlight: false,    // a correct bubble is mid-rise (guards double-fills)
  };

  function startLevel(index) {
    state.levelIndex = index;
    state.word = LEVELS[index];
    state.activeSlot = 0;
    state.accepting = true;
    state.inFlight = false;

    Cloud.setWord(state.word);
    Cloud.setActive(0);
    Pictures.show(state.word);
    Keyboard.setLit(litLettersUpTo(index));
    Keyboard.setTarget(state.word[0]);
  }

  function advance() {
    state.activeSlot++;
    if (state.activeSlot >= state.word.length) {
      completeWord();
    } else {
      Keyboard.setTarget(state.word[state.activeSlot]);
      Cloud.setActive(state.activeSlot);
    }
  }

  /**
   * The big reward, concentrated at word completion:
   * banner + the picture comes alive + a success jingle, then the word is
   * sounded out slowly letter by letter ("Mmm" "oh" "mmm") and finally
   * spoken whole ("Mom!"). The next level waits for all of it.
   */
  function completeWord() {
    state.accepting = false;
    Keyboard.setTarget(null);
    Cloud.setActive(null);
    showBanner(state.word);
    Pictures.celebrate();
    Audio.jingle();

    const letters = [...state.word];
    letters.forEach((letter, i) => {
      setTimeout(() => Audio.play(letter),
        CONFIG.spellStartMs + i * CONFIG.spellLetterMs);
    });
    const wordAt = CONFIG.spellStartMs + letters.length * CONFIG.spellLetterMs
      + CONFIG.spellWordGapMs;
    setTimeout(() => Audio.sayWord(state.word), wordAt);

    setTimeout(() => {
      hideBanner();
      const next = (state.levelIndex + 1) % LEVELS.length;   // loop back at end
      startLevel(next);
    }, wordAt + CONFIG.nextLevelDelayMs);
  }

  function showBanner(text) {
    banner.textContent = text + "!";
    banner.classList.add("show");
  }
  function hideBanner() { banner.classList.remove("show"); }

  /** Central handler for every key/tap. Sound always plays for lit keys. */
  function handlePress(letter) {
    if (!Keyboard.isLit(letter)) return;   // unlearned keys are inert
    Audio.play(letter);

    const current = state.word[state.activeSlot];

    // The target press: launch the bubble to the active gap. inFlight
    // guards the rise - without it, a quick double-press would fill the
    // same slot twice and skip a letter.
    if (state.accepting && !state.inFlight && letter === current) {
      const slot = state.activeSlot;              // capture before it advances
      const fromKey = Keyboard.keyScreenPos(letter);
      const toSlot = Cloud.slotScreenPos(slot);
      state.inFlight = true;
      Keyboard.setTarget(null);                   // stop glow while it flies
      Cloud.setActive(null);
      Balloons.launchToTarget(letter, fromKey, toSlot, candyFor(slot), () => {
        state.inFlight = false;
        Cloud.fill(slot);
        advance();
      });
      return;
    }

    // Re-pressing the letter that just worked: its bubble flies back to
    // the (already filled) gap and lands there again - a friendly rep,
    // no progression change.
    const prevSlot = state.activeSlot - 1;
    if (state.accepting && prevSlot >= 0 &&
        letter === state.word[prevSlot] && letter !== current) {
      Balloons.launchToTarget(letter, Keyboard.keyScreenPos(letter),
        Cloud.slotScreenPos(prevSlot), candyFor(prevSlot),
        () => Cloud.refill(prevSlot));
      return;
    }

    // Wrong or extra key: a balloon drifts by, but nothing lands.
    Balloons.launchStray(letter, Keyboard.keyScreenPos(letter));
  }

  function init() {
    Keyboard.build();
    Keyboard.setHandler(handlePress);
    window.addEventListener("keydown", (e) => {
      // Modifier keys themselves get a decorative nudge...
      if (e.key === "Shift" || e.key === "Control" || e.key === "Alt" || e.key === "Meta") {
        Keyboard.flash(e.key);
        return;
      }
      // ...but shortcut combos (Cmd/Ctrl+R...) are left for the browser.
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      const letter = e.key.length === 1 ? e.key.toUpperCase() : e.key;
      if (letter.length === 1 && letter >= "A" && letter <= "Z") {
        e.preventDefault();
        handlePress(letter);
      } else if (Keyboard.flash(e.key)) {
        e.preventDefault();   // decorative key: acknowledged, but inert
      }
    });
  }

  return { init, startLevel };
})();


/* ---------------------------------------------------------------------
   Bootstrap  - wire up the "Tap to start" gate (unlocks audio), then go.
   --------------------------------------------------------------------- */
(function main() {
  Game.init();
  const gate = document.getElementById("start-gate");
  document.getElementById("start-button").addEventListener("click", () => {
    Audio.unlock();
    gate.style.display = "none";
    Game.startLevel(0);
  });
})();
</script>
